<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Terminal Hub</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- Top bar with tabs -->
    <div id="topbar">
      <div id="tabs-container">
        <div id="tabs"></div>
        <button id="new-tab-btn" title="New Terminal">+</button>
      </div>
    </div>

    <!-- Terminal area -->
    <div id="terminal-area">
      <div id="welcome" class="welcome-screen">
        <h1>Terminal Hub</h1>
        <p>Open a terminal session</p>
        <div class="quick-launch">
          <button onclick="pickShell('bash')">
            <span class="ql-icon">$</span>
            <span>Bash</span>
          </button>
          <button onclick="pickShell('powershell.exe')">
            <span class="ql-icon">PS</span>
            <span>PowerShell</span>
          </button>
          <button onclick="pickShell('cmd.exe')">
            <span class="ql-icon">&gt;</span>
            <span>CMD</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Virtual keyboard for mobile -->
    <div id="vkeyboard">
      <!-- Compact bar (always visible) -->
      <div class="vk-row vk-compact-bar" id="vk-compact">
        <button class="vk-key vk-action" data-key="Tab">Tab</button>
        <button class="vk-key vk-action" data-key="ArrowUp">▲</button>
        <button class="vk-key vk-action" data-key="ArrowDown">▼</button>
        <button class="vk-key vk-action" data-key="ArrowLeft">◀</button>
        <button class="vk-key vk-action" data-key="ArrowRight">▶</button>
        <button class="vk-key vk-danger" data-combo="ctrl+c">^C</button>
        <button class="vk-key vk-action" data-key="Escape">Esc</button>
        <button class="vk-key vk-zoom-btn" id="vk-zoom-btn" title="Zoom">A</button>
        <button class="vk-key vk-expand-btn" id="vk-expand-btn">···</button>
      </div>
      <!-- Expanded rows (hidden by default) -->
      <div id="vk-expanded" class="vk-expanded hidden">
        <!-- Mode toggle: Shell / Claude / Links -->
        <div class="vk-row vk-mode-toggle">
          <button class="vk-mode-btn" id="vk-mode-shell" onclick="switchVkMode('shell')">Shell</button>
          <button class="vk-mode-btn active" id="vk-mode-claude" onclick="switchVkMode('claude')">Claude</button>
          <button class="vk-mode-btn" id="vk-mode-links" onclick="switchVkMode('links')">Links <span id="vk-links-badge" class="vk-links-badge hidden">0</span></button>
        </div>

        <!-- ===== Claude Code Keys ===== -->
        <div id="vk-claude-keys">
          <!-- Row: model & thinking -->
          <div class="vk-row">
            <button class="vk-key vk-claude" data-seq="\x1bp">Model</button>
            <button class="vk-key vk-claude" data-seq="\x1bt">Think</button>
            <button class="vk-key vk-claude" data-combo="ctrl+o">Verbose</button>
            <button class="vk-key vk-claude" data-combo="ctrl+l">Clear</button>
          </div>
          <!-- Row: actions -->
          <div class="vk-row">
            <button class="vk-key vk-claude" data-combo="ctrl+b">BgTask</button>
            <button class="vk-key vk-claude" data-seq="\x1b[Z">AutoMode</button>
            <button class="vk-key vk-claude" data-combo="ctrl+g">Editor</button>
            <button class="vk-key vk-claude-warn" data-combo="ctrl+f">KillBg</button>
          </div>
          <!-- Row: input helpers -->
          <div class="vk-row">
            <button class="vk-key vk-claude" data-seq="\x1b\x1b">Rewind</button>
            <button class="vk-key vk-claude" data-seq="\x5c\x0a">Newline</button>
            <button class="vk-key vk-claude" data-char="@">@File</button>
            <button class="vk-key vk-claude" data-char="/">/Cmd</button>
          </div>
        </div>

        <!-- ===== Shell Keys ===== -->
        <div id="vk-shell-keys" class="hidden">
          <!-- Row 1: modifier toggles -->
          <div class="vk-row vk-modifiers">
            <button class="vk-key vk-toggle" data-mod="ctrl" id="vk-ctrl">Ctrl</button>
            <button class="vk-key vk-toggle" data-mod="alt" id="vk-alt">Alt</button>
            <button class="vk-key vk-toggle" data-mod="shift" id="vk-shift">Shift</button>
            <button class="vk-key vk-action" data-key="Escape">Esc</button>
          </div>
          <!-- Row 2: arrows -->
          <div class="vk-row">
            <button class="vk-key vk-action" data-key="ArrowUp">&#x25B2;</button>
            <button class="vk-key vk-action" data-key="ArrowDown">&#x25BC;</button>
            <button class="vk-key vk-action" data-key="Home">Home</button>
            <button class="vk-key vk-action" data-key="End">End</button>
          </div>
          <!-- Row 3: signals + editing -->
          <div class="vk-row">
            <button class="vk-key vk-warn" data-combo="ctrl+d">^D</button>
            <button class="vk-key vk-warn" data-combo="ctrl+z">^Z</button>
            <button class="vk-key vk-action" data-combo="ctrl+l">Clear</button>
            <button class="vk-key vk-action" data-combo="ctrl+a">^A</button>
            <button class="vk-key vk-action" data-combo="ctrl+e">^E</button>
          </div>
          <!-- Row 4: pipe, redirect, special -->
          <div class="vk-row">
            <button class="vk-key vk-action" data-combo="ctrl+r">^R</button>
            <button class="vk-key vk-action" data-char="|">|</button>
            <button class="vk-key vk-action" data-char="&">&amp;</button>
            <button class="vk-key vk-action" data-char=">">&gt;</button>
            <button class="vk-key vk-action" data-char="<">&lt;</button>
            <button class="vk-key vk-action" data-char="~">~</button>
            <button class="vk-key vk-action" data-char="/">/</button>
          </div>
          <!-- Row 5: symbols -->
          <div class="vk-row">
            <button class="vk-key vk-action" data-char="-">-</button>
            <button class="vk-key vk-action" data-char="_">_</button>
            <button class="vk-key vk-action" data-char=".">.</button>
            <button class="vk-key vk-action" data-char="*">*</button>
            <button class="vk-key vk-action" data-char="$">$</button>
            <button class="vk-key vk-action" data-char="(">(</button>
            <button class="vk-key vk-action" data-char=")">)</button>
            <button class="vk-key vk-action" data-char=";">;</button>
          </div>
        </div>

        <!-- ===== Links Panel ===== -->
        <div id="vk-links-panel" class="hidden">
          <div class="links-panel-header">
            <span class="links-panel-title">Captured URLs & File Paths</span>
            <button class="links-panel-clear" onclick="clearCapturedLinks()" title="Clear all">Clear</button>
          </div>
          <div id="links-panel-list" class="links-panel-list">
            <div class="links-panel-empty">No links captured yet. URLs and file paths from terminal output will appear here.</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Status bar -->
    <div id="statusbar">
      <span id="group-badge"></span>
      <span id="status-text">Ready</span>
      <button id="vk-toggle-btn" title="Toggle virtual keyboard">⌨</button>
      <button id="switch-group-btn" title="Switch group">⇄ Groups</button>
      <span id="terminal-count">0 terminals</span>
    </div>

    <!-- Shell picker modal -->
    <div id="shell-modal" class="modal hidden">
      <div class="modal-backdrop" onclick="closeShellModal()"></div>
      <div class="modal-content">
        <h3>New Terminal</h3>
        <button class="modal-shell-btn" onclick="pickShell('bash')">
          <span class="ql-icon">$</span> Bash
        </button>
        <button class="modal-shell-btn" onclick="pickShell('powershell.exe')">
          <span class="ql-icon">PS</span> PowerShell
        </button>
        <button class="modal-shell-btn" onclick="pickShell('cmd.exe')">
          <span class="ql-icon">&gt;</span> CMD
        </button>
      </div>
    </div>

    <!-- Directory browser modal -->
    <div id="dir-modal" class="modal hidden">
      <div class="modal-backdrop" onclick="closeDirModal()"></div>
      <div class="modal-content dir-modal-content">
        <div class="dir-modal-header">
          <h3>Choose Starting Directory</h3>
          <input type="text" id="dir-path-input" class="form-input dir-path-input" placeholder="Type or paste a path..." />
        </div>
        <div id="dir-recent" class="dir-recent hidden"></div>
        <div id="dir-breadcrumb" class="dir-breadcrumb"></div>
        <div id="dir-entry-list" class="dir-entry-list"></div>
        <div id="dir-error" class="dir-error hidden"></div>
        <div class="dir-modal-footer">
          <button class="form-btn form-btn-save" onclick="confirmDirectory()">Use This Directory</button>
          <button class="form-btn form-btn-cancel" onclick="useHomeDirectory()">Home Dir</button>
          <button class="form-btn form-btn-cancel" onclick="closeDirModal()">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const sessions = {};
    let activeId = null;
    const modifiers = { ctrl: false, alt: false, shift: false };

    // ---- Auth helpers ----
    function getToken() {
      const match = document.cookie.match(/(?:^|;\s*)token=([^;]*)/);
      return match ? match[1] : null;
    }

    function getWsUrl() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      return `${proto}//${location.host}/ws`;
    }

    function handleKicked(msg) {
      alert('Session expired: ' + (msg || 'Another device logged in to this group.'));
      window.location.href = '/welcome';
    }

    // Check API response for 401
    async function authFetch(url, opts) {
      const resp = await fetch(url, opts);
      if (resp.status === 401) {
        window.location.href = '/welcome';
        throw new Error('Unauthorized');
      }
      return resp;
    }

    // ---- Shell modal ----
    function openShellModal() {
      document.getElementById('shell-modal').classList.remove('hidden');
    }
    function closeShellModal() {
      document.getElementById('shell-modal').classList.add('hidden');
    }

    // ---- Recent directories (localStorage) ----
    const RECENT_DIRS_KEY = 'termhub_recent_dirs';
    const RECENT_DIRS_MAX = 8;

    function getRecentDirs() {
      try {
        return JSON.parse(localStorage.getItem(RECENT_DIRS_KEY)) || [];
      } catch (_) { return []; }
    }

    function saveRecentDir(dirPath) {
      if (!dirPath) return;
      let dirs = getRecentDirs();
      // Remove duplicate (case-insensitive on Windows)
      dirs = dirs.filter(d => d.toLowerCase() !== dirPath.toLowerCase());
      dirs.unshift(dirPath); // most recent first
      if (dirs.length > RECENT_DIRS_MAX) dirs = dirs.slice(0, RECENT_DIRS_MAX);
      localStorage.setItem(RECENT_DIRS_KEY, JSON.stringify(dirs));
    }

    function removeRecentDir(dirPath) {
      let dirs = getRecentDirs();
      dirs = dirs.filter(d => d.toLowerCase() !== dirPath.toLowerCase());
      localStorage.setItem(RECENT_DIRS_KEY, JSON.stringify(dirs));
    }

    function renderRecentDirs() {
      const container = document.getElementById('dir-recent');
      const dirs = getRecentDirs();
      if (dirs.length === 0) {
        container.classList.add('hidden');
        return;
      }
      container.classList.remove('hidden');
      container.innerHTML = '<div class="dir-recent-title">Recent</div>';
      const list = document.createElement('div');
      list.className = 'dir-recent-list';
      for (const dir of dirs) {
        const row = document.createElement('div');
        row.className = 'dir-recent-row';
        const lastSeg = dir.replace(/[\\/]+$/, '').split(/[\\/]/).pop() || dir;
        row.innerHTML = `<span class="dir-recent-icon">&#x1F552;</span><span class="dir-recent-name" title="${escapeHtml(dir)}">${escapeHtml(lastSeg)}</span><span class="dir-recent-path">${escapeHtml(dir)}</span><button class="dir-recent-remove" title="Remove">&times;</button>`;
        row.querySelector('.dir-recent-remove').addEventListener('click', (e) => {
          e.stopPropagation();
          removeRecentDir(dir);
          renderRecentDirs();
        });
        row.addEventListener('click', () => {
          browseDirectory(dir);
        });
        list.appendChild(row);
      }
      container.appendChild(list);
    }

    // ---- Directory browser ----
    let pendingShell = null;
    let currentBrowsePath = '';
    let dirInputTimer = null;
    let cachedDrives = null;

    function pickShell(shell) {
      pendingShell = shell;
      closeShellModal();
      openDirModal();
    }

    function openDirModal() {
      document.getElementById('dir-modal').classList.remove('hidden');
      renderRecentDirs();
      browseDirectory(''); // empty = server defaults to HOME
    }

    function closeDirModal() {
      document.getElementById('dir-modal').classList.add('hidden');
      pendingShell = null;
      currentBrowsePath = '';
    }

    async function browseDirectory(dirPath) {
      const listEl = document.getElementById('dir-entry-list');
      const errorEl = document.getElementById('dir-error');
      errorEl.classList.add('hidden');
      listEl.innerHTML = '<div class="dir-loading">Loading...</div>';

      try {
        const url = '/api/fs/browse' + (dirPath ? '?path=' + encodeURIComponent(dirPath) : '');
        const resp = await authFetch(url);
        const data = await resp.json();

        if (data.error) {
          errorEl.textContent = data.error;
          errorEl.classList.remove('hidden');
          listEl.innerHTML = '';
          return;
        }

        currentBrowsePath = data.path;
        document.getElementById('dir-path-input').value = data.path;
        renderBreadcrumb(data.path, data.separator);
        renderBrowserEntries(data.entries, data.parent, data.path, data.separator);
      } catch (err) {
        errorEl.textContent = 'Failed to browse: ' + err.message;
        errorEl.classList.remove('hidden');
        listEl.innerHTML = '';
      }
    }

    function renderBreadcrumb(fullPath, sep) {
      const bc = document.getElementById('dir-breadcrumb');
      bc.innerHTML = '';

      // Split path into segments
      const parts = fullPath.split(/[\\/]/).filter(Boolean);

      // On Windows, first part is drive like "C:"
      let accumulated = '';
      parts.forEach((part, i) => {
        if (i > 0) {
          const sepEl = document.createElement('span');
          sepEl.className = 'dir-breadcrumb-sep';
          sepEl.textContent = sep;
          bc.appendChild(sepEl);
        }

        accumulated += (i === 0 ? '' : sep) + part;
        const segPath = i === 0 ? part + sep : accumulated;

        const btn = document.createElement('button');
        btn.className = 'dir-breadcrumb-seg';
        btn.textContent = part;
        btn.addEventListener('click', () => browseDirectory(segPath));
        bc.appendChild(btn);
      });

      // Auto-scroll breadcrumb to end
      bc.scrollLeft = bc.scrollWidth;
    }

    async function renderBrowserEntries(entries, parent, currentPath, sep) {
      const listEl = document.getElementById('dir-entry-list');
      const frag = document.createDocumentFragment();

      // If at drive root (no parent), show drives list
      if (parent === null) {
        await renderDrivesList(frag);
      } else {
        // ".." row to go up
        const upRow = document.createElement('div');
        upRow.className = 'dir-entry-row dir-up-row';
        upRow.innerHTML = '<span class="dir-entry-icon">&#x2B06;</span><span class="dir-entry-name">..</span>';
        upRow.addEventListener('click', () => browseDirectory(parent));
        frag.appendChild(upRow);
      }

      const trailing = currentPath.endsWith(sep) ? '' : sep;
      for (const entry of entries) {
        const row = document.createElement('div');
        row.className = 'dir-entry-row' + (entry.type === 'file' ? ' is-file' : '');

        const icon = entry.type === 'dir' ? '&#x1F4C1;' : '&#x1F4C4;';
        row.innerHTML = `<span class="dir-entry-icon">${icon}</span><span class="dir-entry-name">${escapeHtml(entry.name)}</span>`;

        if (entry.type === 'dir') {
          row.addEventListener('click', () => {
            browseDirectory(currentPath + trailing + entry.name);
          });
        }

        frag.appendChild(row);
      }

      listEl.innerHTML = '';
      listEl.appendChild(frag);
    }

    async function renderDrivesList(listEl) {
      if (!cachedDrives) {
        try {
          const resp = await authFetch('/api/fs/drives');
          const data = await resp.json();
          cachedDrives = data.drives || [];
        } catch (_) {
          cachedDrives = [];
        }
      }

      if (cachedDrives.length > 0) {
        const drivesRow = document.createElement('div');
        drivesRow.className = 'dir-drives-row';
        for (const drive of cachedDrives) {
          const btn = document.createElement('button');
          btn.className = 'dir-drive-btn';
          btn.textContent = drive;
          btn.addEventListener('click', () => browseDirectory(drive));
          drivesRow.appendChild(btn);
        }
        listEl.appendChild(drivesRow);
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function confirmDirectory() {
      const shell = pendingShell;
      const cwd = currentBrowsePath || '';
      if (cwd) saveRecentDir(cwd);
      closeDirModal();
      createTerminal(shell, cwd);
    }

    function useHomeDirectory() {
      const shell = pendingShell;
      closeDirModal();
      createTerminal(shell, '');
    }

    // Debounced path input
    document.getElementById('dir-path-input').addEventListener('input', (e) => {
      clearTimeout(dirInputTimer);
      dirInputTimer = setTimeout(() => {
        const val = e.target.value.trim();
        if (val) browseDirectory(val);
      }, 400);
    });

    // ---- Virtual keyboard ----
    function sendKey(key) {
      if (!activeId || !sessions[activeId]) return;
      const s = sessions[activeId];
      if (s.ws.readyState !== WebSocket.OPEN) return;
      s.ws.send(JSON.stringify({ type: 'input', data: key }));
      s.terminal.focus();
    }

    function getEscapeSequence(key) {
      const map = {
        'ArrowUp': '\x1b[A',
        'ArrowDown': '\x1b[B',
        'ArrowRight': '\x1b[C',
        'ArrowLeft': '\x1b[D',
        'Home': '\x1b[H',
        'End': '\x1b[F',
        'Tab': '\t',
        'Escape': '\x1b',
        'Delete': '\x1b[3~',
        'PageUp': '\x1b[5~',
        'PageDown': '\x1b[6~',
      };
      return map[key] || null;
    }

    function ctrlKey(letter) {
      return String.fromCharCode(letter.toUpperCase().charCodeAt(0) - 64);
    }

    // Virtual keyboard button handler
    document.getElementById('vkeyboard').addEventListener('click', (e) => {
      const btn = e.target.closest('.vk-key');
      if (!btn) return;
      e.preventDefault();
      e.stopPropagation();

      // Toggle modifier
      if (btn.classList.contains('vk-toggle')) {
        const mod = btn.dataset.mod;
        modifiers[mod] = !modifiers[mod];
        btn.classList.toggle('vk-active', modifiers[mod]);
        return;
      }

      // Combo (ctrl+c etc.)
      if (btn.dataset.combo) {
        const parts = btn.dataset.combo.split('+');
        const letter = parts[parts.length - 1];
        sendKey(ctrlKey(letter));
        resetModifiers();
        return;
      }

      // Raw escape sequence (Claude Code keys: Alt+P, Esc+Esc, etc.)
      if (btn.dataset.seq) {
        const raw = btn.dataset.seq
          .replace(/\\x1b/g, '\x1b')
          .replace(/\\x([0-9a-fA-F]{2})/g, (_, hex) => String.fromCharCode(parseInt(hex, 16)));
        sendKey(raw);
        resetModifiers();
        return;
      }

      // Special key (arrows, tab, esc)
      if (btn.dataset.key) {
        let seq = getEscapeSequence(btn.dataset.key);
        if (seq) {
          if (modifiers.shift && btn.dataset.key.startsWith('Arrow')) {
            // Shift+Arrow for selection in some apps
            seq = seq.replace('[', '[1;2');
          }
          sendKey(seq);
          resetModifiers();
          return;
        }
      }

      // Character key
      if (btn.dataset.char) {
        let ch = btn.dataset.char;
        if (modifiers.ctrl) {
          sendKey(ctrlKey(ch));
        } else {
          sendKey(ch);
        }
        resetModifiers();
        return;
      }
    });

    // Prevent long-press context menu on virtual keyboard
    document.getElementById('vkeyboard').addEventListener('contextmenu', (e) => e.preventDefault());

    function resetModifiers() {
      modifiers.ctrl = false;
      modifiers.alt = false;
      modifiers.shift = false;
      document.querySelectorAll('.vk-toggle').forEach(b => b.classList.remove('vk-active'));
    }

    // Toggle virtual keyboard visibility (whole bar)
    let vkVisible = true;
    document.getElementById('vk-toggle-btn').addEventListener('click', () => {
      vkVisible = !vkVisible;
      document.getElementById('vkeyboard').style.display = vkVisible ? 'flex' : 'none';
      if (activeId && sessions[activeId]) {
        setTimeout(() => sessions[activeId].fitAddon.fit(), 100);
      }
    });

    // Expand/collapse extra rows
    let vkExpanded = false;
    document.getElementById('vk-expand-btn').addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      vkExpanded = !vkExpanded;
      document.getElementById('vk-expanded').classList.toggle('hidden', !vkExpanded);
      document.getElementById('vk-expand-btn').textContent = vkExpanded ? '▾' : '···';
      document.getElementById('vk-expand-btn').classList.toggle('vk-active', vkExpanded);
      if (activeId && sessions[activeId]) {
        setTimeout(() => sessions[activeId].fitAddon.fit(), 100);
      }
    });

    // ---- Virtual keyboard mode toggle (Shell / Claude) ----
    let vkMode = localStorage.getItem('termhub_vk_mode') || 'claude';

    function switchVkMode(mode) {
      vkMode = mode;
      // Only persist shell/claude preference (not links — it's a temporary view)
      if (mode !== 'links') localStorage.setItem('termhub_vk_mode', mode);
      document.getElementById('vk-claude-keys').classList.toggle('hidden', mode !== 'claude');
      document.getElementById('vk-shell-keys').classList.toggle('hidden', mode !== 'shell');
      document.getElementById('vk-links-panel').classList.toggle('hidden', mode !== 'links');
      document.getElementById('vk-mode-claude').classList.toggle('active', mode === 'claude');
      document.getElementById('vk-mode-shell').classList.toggle('active', mode === 'shell');
      document.getElementById('vk-mode-links').classList.toggle('active', mode === 'links');
      // Re-fit terminal after keyboard layout change
      if (activeId && sessions[activeId]) {
        setTimeout(() => {
          if (sessions[activeId].fitAddon) sessions[activeId].fitAddon.fit();
        }, 100);
      }
    }

    // Apply saved mode on load
    switchVkMode(vkMode);

    // ---- Links panel rendering ----
    function renderLinksPanel() {
      const list = document.getElementById('links-panel-list');
      const badge = document.getElementById('vk-links-badge');

      // Update badge count
      badge.textContent = capturedLinks.length;
      badge.classList.toggle('hidden', capturedLinks.length === 0);

      if (capturedLinks.length === 0) {
        list.innerHTML = '<div class="links-panel-empty">No links captured yet. URLs and file paths from terminal output will appear here.</div>';
        return;
      }

      const frag = document.createDocumentFragment();
      for (const link of capturedLinks) {
        const row = document.createElement('div');
        row.className = 'links-panel-row';
        row.dataset.type = link.type;

        const icon = document.createElement('span');
        icon.className = 'links-panel-icon';
        icon.textContent = link.type === 'url' ? '🌐' : '📄';

        const text = document.createElement('span');
        text.className = 'links-panel-text';
        text.textContent = link.text;
        text.title = link.text;

        row.appendChild(icon);
        row.appendChild(text);

        row.addEventListener('click', () => {
          if (link.type === 'url') {
            window.open(link.text, '_blank', 'noopener');
          } else {
            openFileInViewer(link.text);
          }
        });

        frag.appendChild(row);
      }

      list.innerHTML = '';
      list.appendChild(frag);
    }

    function clearCapturedLinks() {
      capturedLinks.length = 0;
      capturedLinksSet.clear();
      renderLinksPanel();
    }

    // ---- Zoom: cycle font sizes ----
    const ZOOM_LEVELS = [
      { size: 9,  label: 'A⁻' },
      { size: 11, label: 'A'  },
      { size: 13, label: 'A⁺' },
      { size: 16, label: 'A⁺⁺' },
    ];
    // Default: small on mobile, medium on desktop
    let zoomIndex = window.innerWidth < 768 ? 0 : 1;

    function applyZoom() {
      const level = ZOOM_LEVELS[zoomIndex];
      document.getElementById('vk-zoom-btn').textContent = level.label;
      // Apply to all terminal sessions (skip file viewers)
      for (const [id, s] of Object.entries(sessions)) {
        if (!s.terminal) continue;
        s.terminal.options.fontSize = level.size;
        s.fitAddon.fit();
      }
    }

    document.getElementById('vk-zoom-btn').addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      zoomIndex = (zoomIndex + 1) % ZOOM_LEVELS.length;
      applyZoom();
    });

    // Initialize zoom label
    document.getElementById('vk-zoom-btn').textContent = ZOOM_LEVELS[zoomIndex].label;

    // ---- Terminal management ----

    async function createTerminal(shell, cwd) {
      if (!shell) shell = 'bash';
      setStatus('Starting terminal...');

      const body = { shell, cols: 80, rows: 24 };
      if (cwd) body.cwd = cwd;

      try {
        const resp = await authFetch('/api/terminal/new', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await resp.json();
        if (data.error) throw new Error(data.error);

        const id = data.id;

        // Build tab label — append last dir segment if custom cwd
        let tabLabel = `${getShellName(shell)} #${id}`;
        if (cwd) {
          const lastSeg = cwd.replace(/[\\/]+$/, '').split(/[\\/]/).pop();
          if (lastSeg) tabLabel += ` \u00B7 ${lastSeg}`;
        }

        // Create tab
        const tabEl = document.createElement('div');
        tabEl.className = 'tab';
        tabEl.dataset.id = id;
        tabEl.innerHTML = `
          <span class="tab-icon">${getShellIcon(shell)}</span>
          <span class="tab-label">${tabLabel}</span>
          <button class="tab-close" title="Close">&times;</button>
        `;
        tabEl.addEventListener('click', (e) => {
          if (!e.target.classList.contains('tab-close')) switchTab(id);
        });
        tabEl.querySelector('.tab-close').addEventListener('click', (e) => {
          e.stopPropagation();
          closeTerminal(id);
        });
        document.getElementById('tabs').appendChild(tabEl);

        // Create terminal container
        const container = document.createElement('div');
        container.className = 'terminal-container';
        container.dataset.id = id;
        document.getElementById('terminal-area').appendChild(container);

        // Create xterm.js — use current zoom level
        const term = new Terminal({
          cursorBlink: true,
          fontSize: ZOOM_LEVELS[zoomIndex].size,
          fontFamily: "'Cascadia Code', 'Fira Code', 'Consolas', 'Courier New', monospace",
          theme: {
            background: '#0a192f',
            foreground: '#d2d2d2',
            cursor: '#64ffda',
            selectionBackground: '#1f4068'
          },
          allowProposedApi: true,
          scrollback: 5000
        });

        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        try {
          const webLinksAddon = new WebLinksAddon.WebLinksAddon();
          term.loadAddon(webLinksAddon);
        } catch(e) {}

        term.open(container);
        fitAddon.fit();

        sessions[id] = { tab: tabEl, container, terminal: term, fitAddon, ws: null, cwd: cwd || '' };
        connectWs(id);

        term.onData((data) => {
          const s = sessions[id];
          if (s && s.ws && s.ws.readyState === WebSocket.OPEN) {
            s.ws.send(JSON.stringify({ type: 'input', data }));
          }
        });

        term.onResize(({ cols, rows }) => {
          const s = sessions[id];
          if (s && s.ws && s.ws.readyState === WebSocket.OPEN) {
            s.ws.send(JSON.stringify({ type: 'resize', cols, rows }));
          }
        });
        document.getElementById('welcome').style.display = 'none';
        switchTab(id);
        updateCount();

      } catch (err) {
        setStatus('Error: ' + err.message);
      }
    }

    // ---- Link detection from terminal output ----
    const FILE_PATH_REGEX = /(?:[A-Za-z]:[\\\/]|\/(?!\/)|~\/|\.\/|\.\.\/)[^\s:,"'`()\[\]{}|<>]+\.\w+(?::\d+(?::\d+)?)?/g;
    const URL_REGEX = /https?:\/\/[^\s"'`<>()[\]{}]+/gi;
    let nextFileViewerId = 10000;

    // Captured links: { text, type: 'url'|'file', timestamp }
    const capturedLinks = [];
    const MAX_CAPTURED_LINKS = 100;
    const capturedLinksSet = new Set(); // deduplicate by text

    // Strip ANSI escape codes from terminal output before scanning
    function stripAnsi(str) {
      return str.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '')
                .replace(/\x1b\][^\x07]*\x07/g, '')
                .replace(/\x1b[()][AB012]/g, '')
                .replace(/\x1b[\x20-\x2F][\x30-\x7E]/g, '');
    }

    function scanOutputForLinks(rawData) {
      const data = stripAnsi(rawData);
      let found = false;

      // Scan for URLs
      URL_REGEX.lastIndex = 0;
      let match;
      while ((match = URL_REGEX.exec(data)) !== null) {
        let url = match[0];
        // Trim trailing punctuation that's likely not part of URL
        url = url.replace(/[.,;:!?)]+$/, '');
        if (!capturedLinksSet.has(url)) {
          capturedLinksSet.add(url);
          capturedLinks.unshift({ text: url, type: 'url', timestamp: Date.now() });
          found = true;
        }
      }

      // Scan for file paths
      FILE_PATH_REGEX.lastIndex = 0;
      while ((match = FILE_PATH_REGEX.exec(data)) !== null) {
        const fp = match[0];
        if (!capturedLinksSet.has(fp)) {
          capturedLinksSet.add(fp);
          capturedLinks.unshift({ text: fp, type: 'file', timestamp: Date.now() });
          found = true;
        }
      }

      // Trim to max
      while (capturedLinks.length > MAX_CAPTURED_LINKS) {
        const removed = capturedLinks.pop();
        capturedLinksSet.delete(removed.text);
      }

      if (found) renderLinksPanel();
    }

    async function openFileInViewer(rawPath) {
      // Strip line:col suffix
      let filePath = rawPath;
      let lineNumber = null;
      const lineColMatch = rawPath.match(/^(.+?):(\d+)(?::\d+)?$/);
      if (lineColMatch) {
        filePath = lineColMatch[1];
        lineNumber = parseInt(lineColMatch[2]);
      }

      // Resolve relative paths against the active terminal's cwd
      if (filePath && !filePath.match(/^[A-Za-z]:[\\\/]/) && !filePath.startsWith('/') && !filePath.startsWith('~')) {
        const activeSess = sessions[activeId];
        if (activeSess && activeSess.cwd) {
          const sep = activeSess.cwd.includes('\\') ? '\\' : '/';
          filePath = activeSess.cwd + (activeSess.cwd.endsWith(sep) ? '' : sep) + filePath;
        }
      }

      setStatus(`Opening ${filePath}...`);

      try {
        const resp = await authFetch(`/api/fs/read?path=${encodeURIComponent(filePath)}`);
        const data = await resp.json();

        if (data.error) {
          setStatus(`Error: ${data.error}`);
          return;
        }

        // Check if file is already open — switch to existing tab
        for (const [existingId, s] of Object.entries(sessions)) {
          if (s.type === 'file' && s.filePath === data.path) {
            switchTab(parseInt(existingId) || existingId);
            setStatus(`Already open: ${data.name}`);
            return;
          }
        }

        const id = nextFileViewerId++;

        // Create tab
        const tabEl = document.createElement('div');
        tabEl.className = 'tab';
        tabEl.dataset.id = id;
        tabEl.innerHTML = `
          <span class="tab-icon file-tab-icon">&#x1F4C4;</span>
          <span class="tab-label">${escapeHtml(data.name)}</span>
          <button class="tab-close" title="Close">&times;</button>
        `;
        tabEl.addEventListener('click', (e) => {
          if (!e.target.classList.contains('tab-close')) switchTab(id);
        });
        tabEl.querySelector('.tab-close').addEventListener('click', (e) => {
          e.stopPropagation();
          closeTerminal(id);
        });
        document.getElementById('tabs').appendChild(tabEl);

        // Create file viewer container
        const container = document.createElement('div');
        container.className = 'terminal-container file-viewer-container';
        container.dataset.id = id;

        // Header
        const header = document.createElement('div');
        header.className = 'file-viewer-header';
        header.innerHTML = `
          <span class="file-viewer-path" title="${escapeHtml(data.path)}">${escapeHtml(data.path)}</span>
          <span class="file-viewer-meta">${formatFileSize(data.size)} &middot; ${escapeHtml(data.extension || 'text')}</span>
        `;
        container.appendChild(header);

        // Content with line numbers
        const contentArea = document.createElement('div');
        contentArea.className = 'file-viewer-content';

        const lines = data.content.split('\n');
        const table = document.createElement('table');
        table.className = 'file-viewer-table';

        for (let i = 0; i < lines.length; i++) {
          const tr = document.createElement('tr');
          if (lineNumber && i + 1 === lineNumber) {
            tr.className = 'file-viewer-highlight-line';
          }
          const tdNum = document.createElement('td');
          tdNum.className = 'file-line-num';
          tdNum.textContent = i + 1;
          const tdCode = document.createElement('td');
          tdCode.className = 'file-line-code';
          tdCode.textContent = lines[i];
          tr.appendChild(tdNum);
          tr.appendChild(tdCode);
          table.appendChild(tr);
        }

        contentArea.appendChild(table);
        container.appendChild(contentArea);
        document.getElementById('terminal-area').appendChild(container);

        // Store session
        sessions[id] = {
          type: 'file',
          tab: tabEl,
          container,
          terminal: null,
          fitAddon: null,
          ws: null,
          filePath: data.path
        };

        document.getElementById('welcome').style.display = 'none';
        switchTab(id);
        updateCount();
        setStatus(`Opened ${data.name}`);

        // Scroll to highlighted line
        if (lineNumber) {
          const highlightRow = container.querySelector('.file-viewer-highlight-line');
          if (highlightRow) {
            setTimeout(() => highlightRow.scrollIntoView({ block: 'center' }), 100);
          }
        }

      } catch (err) {
        setStatus('Failed to open file: ' + err.message);
      }
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function switchTab(id) {
      for (const [sid, s] of Object.entries(sessions)) {
        s.tab.classList.remove('active');
        s.container.style.display = 'none';
      }
      if (sessions[id]) {
        sessions[id].tab.classList.add('active');
        sessions[id].container.style.display = 'block';
        activeId = id;
        setTimeout(() => {
          if (sessions[id] && sessions[id].terminal) {
            sessions[id].fitAddon.fit();
            sessions[id].terminal.focus();
          }
        }, 50);
      }
    }

    async function closeTerminal(id) {
      setStatus('Closing...');
      // Skip server DELETE for file viewer tabs
      if (!sessions[id] || sessions[id].type !== 'file') {
        try { await authFetch(`/api/terminal/${id}`, { method: 'DELETE' }); } catch (err) {}
      }

      if (sessions[id]) {
        // Clear any pending reconnect timer
        if (sessions[id]._reconnectTimer) clearTimeout(sessions[id]._reconnectTimer);
        // Mark as intentionally closing so ws.onclose won't show reconnect banner
        sessions[id]._closing = true;
        if (sessions[id].ws) sessions[id].ws.close();
        if (sessions[id].terminal) sessions[id].terminal.dispose();
        sessions[id].tab.remove();
        sessions[id].container.remove();
        delete sessions[id];
      }

      const remaining = Object.keys(sessions);
      if (remaining.length > 0) {
        const lastId = remaining[remaining.length - 1];
        switchTab(parseInt(lastId) || lastId);
        // Hide reconnect banner if all remaining terminal sessions are connected
        const anyDisconnected = remaining.some(sid => {
          const s = sessions[sid];
          if (s.type === 'file') return false; // file viewers are never "disconnected"
          return !s.ws || s.ws.readyState !== WebSocket.OPEN;
        });
        if (!anyDisconnected) hideReconnectBanner();
      } else {
        activeId = null;
        document.getElementById('welcome').style.display = 'flex';
        hideReconnectBanner();
      }
      updateCount();
      setStatus('Terminal closed');
    }

    function getShellIcon(s) {
      if (s.includes('powershell') || s.includes('pwsh')) return 'PS';
      if (s.includes('cmd')) return '>';
      return '$';
    }
    function getShellName(s) {
      if (s.includes('powershell')) return 'PS';
      if (s.includes('pwsh')) return 'pwsh';
      if (s.includes('cmd')) return 'CMD';
      return 'Bash';
    }
    function setStatus(t) { document.getElementById('status-text').textContent = t; }
    function updateCount() {
      const c = Object.keys(sessions).length;
      document.getElementById('terminal-count').textContent = c === 1 ? '1 term' : `${c} terms`;
    }

    // Re-fit all on window resize
    window.addEventListener('resize', () => {
      if (activeId && sessions[activeId] && sessions[activeId].fitAddon) {
        sessions[activeId].fitAddon.fit();
      }
    });

    // + button opens shell picker
    document.getElementById('new-tab-btn').addEventListener('click', openShellModal);

    // Desktop shortcut
    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.shiftKey && e.key === 'T') {
        e.preventDefault();
        openShellModal();
      }
    });

    // ---- Reconnect to existing terminals on page load ----
    async function reconnectExisting() {
      try {
        const resp = await authFetch('/api/terminals');
        const list = await resp.json();

        if (list.length === 0) return;

        setStatus(`Reconnecting to ${list.length} terminal(s)...`);
        document.getElementById('welcome').style.display = 'none';

        for (const t of list) {
          await attachToTerminal(t.id, t.shell);
        }

        updateCount();
        setStatus('Reconnected');
      } catch (err) {
        console.error('Reconnect failed:', err);
      }
    }

    // Attach to an existing server-side terminal (no new pty, just WS + UI)
    async function attachToTerminal(id, shell) {
      const tabEl = document.createElement('div');
      tabEl.className = 'tab';
      tabEl.dataset.id = id;
      tabEl.innerHTML = `
        <span class="tab-icon">${getShellIcon(shell)}</span>
        <span class="tab-label">${getShellName(shell)} #${id}</span>
        <button class="tab-close" title="Close">&times;</button>
      `;
      tabEl.addEventListener('click', (e) => {
        if (!e.target.classList.contains('tab-close')) switchTab(id);
      });
      tabEl.querySelector('.tab-close').addEventListener('click', (e) => {
        e.stopPropagation();
        closeTerminal(id);
      });
      document.getElementById('tabs').appendChild(tabEl);

      const container = document.createElement('div');
      container.className = 'terminal-container';
      container.dataset.id = id;
      document.getElementById('terminal-area').appendChild(container);

      const term = new Terminal({
        cursorBlink: true,
        fontSize: ZOOM_LEVELS[zoomIndex].size,
        fontFamily: "'Cascadia Code', 'Fira Code', 'Consolas', 'Courier New', monospace",
        theme: {
          background: '#0a192f',
          foreground: '#d2d2d2',
          cursor: '#64ffda',
          selectionBackground: '#1f4068'
        },
        allowProposedApi: true,
        scrollback: 5000
      });

      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      try {
        const webLinksAddon = new WebLinksAddon.WebLinksAddon();
        term.loadAddon(webLinksAddon);
      } catch(e) {}

      term.open(container);
      fitAddon.fit();

      sessions[id] = { tab: tabEl, container, terminal: term, fitAddon, ws: null, cwd: '' };
      connectWs(id);

      term.onData((data) => {
        const s = sessions[id];
        if (s && s.ws && s.ws.readyState === WebSocket.OPEN) {
          s.ws.send(JSON.stringify({ type: 'input', data }));
        }
      });

      term.onResize(({ cols, rows }) => {
        const s = sessions[id];
        if (s && s.ws && s.ws.readyState === WebSocket.OPEN) {
          s.ws.send(JSON.stringify({ type: 'resize', cols, rows }));
        }
      });
      switchTab(id);
    }

    // ---- WebSocket connect/reconnect ----
    function connectWs(id) {
      const s = sessions[id];
      if (!s) return;

      // Close old socket if any
      if (s.ws) {
        try { s.ws.close(); } catch(_) {}
      }

      const token = getToken();
      const ws = new WebSocket(`${getWsUrl()}?id=${id}&token=${token}`);
      s.ws = ws;
      s._kicked = false;

      ws.onopen = () => {
        setStatus(`Terminal #${id} connected`);
        hideReconnectBanner();
        s.tab.classList.remove('tab-disconnected');
        const dims = s.fitAddon.proposeDimensions();
        if (dims) {
          ws.send(JSON.stringify({ type: 'resize', cols: dims.cols, rows: dims.rows }));
        }
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'output') {
            s.terminal.write(msg.data);
            scanOutputForLinks(msg.data);
          } else if (msg.type === 'exit') {
            s.terminal.write(`\r\n\x1b[31m[Process exited with code ${msg.code}]\x1b[0m\r\n`);
          } else if (msg.type === 'error') {
            s.terminal.write(`\r\n\x1b[31m[Error: ${msg.message}]\x1b[0m\r\n`);
          } else if (msg.type === 'kicked') {
            s._kicked = true;
            handleKicked(msg.message);
          }
        } catch (err) {
          s.terminal.write(event.data);
        }
      };

      ws.onclose = () => {
        if (s._kicked || s._closing) return; // don't reconnect if kicked or intentionally closed
        s.tab.classList.add('tab-disconnected');
        setStatus('Disconnected');
        showReconnectBanner();
        // Auto-retry after 3s
        s._reconnectTimer = setTimeout(() => {
          if (sessions[id] && (!sessions[id].ws || sessions[id].ws.readyState !== WebSocket.OPEN)) {
            connectWs(id);
          }
        }, 3000);
      };

      ws.onerror = () => {};
    }

    // ---- Reconnect banner ----
    function showReconnectBanner() {
      let banner = document.getElementById('reconnect-banner');
      if (!banner) {
        banner = document.createElement('div');
        banner.id = 'reconnect-banner';
        banner.innerHTML = `
          <span>Connection lost — reconnecting...</span>
          <button onclick="reconnectAll()">Reconnect Now</button>
        `;
        document.getElementById('app').insertBefore(banner, document.getElementById('terminal-area'));
      }
      banner.style.display = 'flex';
    }

    function hideReconnectBanner() {
      const banner = document.getElementById('reconnect-banner');
      if (banner) banner.style.display = 'none';
    }

    function reconnectAll() {
      setStatus('Reconnecting...');
      for (const [id, s] of Object.entries(sessions)) {
        if (s.type === 'file') continue; // skip file viewers
        if (s._reconnectTimer) clearTimeout(s._reconnectTimer);
        if (!s.ws || s.ws.readyState !== WebSocket.OPEN) {
          connectWs(parseInt(id));
        }
      }
    }

    // ---- Visibility change: reconnect when app comes back to foreground ----
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        // Small delay to let network recover
        setTimeout(() => {
          let anyDead = false;
          for (const [id, s] of Object.entries(sessions)) {
            if (s.type === 'file') continue; // skip file viewers
            if (!s.ws || s.ws.readyState !== WebSocket.OPEN) {
              anyDead = true;
              connectWs(parseInt(id));
            }
          }
          if (!anyDead) hideReconnectBanner();
          // Re-fit active terminal
          if (activeId && sessions[activeId] && sessions[activeId].fitAddon) {
            sessions[activeId].fitAddon.fit();
          }
        }, 500);
      }
    });

    // Load group info and display in status bar
    async function loadGroupInfo() {
      try {
        const resp = await authFetch('/api/group-info');
        const info = await resp.json();
        const badge = document.getElementById('group-badge');
        badge.textContent = `${info.icon} ${info.name}`;
        badge.style.color = info.color;
        document.title = `Terminal Hub - ${info.name}`;
      } catch (err) {
        console.error('Failed to load group info:', err);
      }
    }

    // Switch group button
    document.getElementById('switch-group-btn').addEventListener('click', () => {
      window.location.href = '/welcome';
    });

    // ---- Mobile keyboard: keep virtual keyboard visible above phone keyboard ----
    function handleViewportResize() {
      const vv = window.visualViewport;
      if (!vv) return;

      const app = document.getElementById('app');
      // Position #app to match the visible viewport exactly
      app.style.top = vv.offsetTop + 'px';
      app.style.height = vv.height + 'px';

      // Re-fit active terminal to the new visible area
      if (activeId && sessions[activeId]) {
        setTimeout(() => sessions[activeId].fitAddon.fit(), 50);
      }
    }

    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', handleViewportResize);
      window.visualViewport.addEventListener('scroll', handleViewportResize);
    }

    // Auto-reconnect on page load
    loadGroupInfo();
    reconnectExisting();
  </script>
</body>
</html>
